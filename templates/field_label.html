<!-- qwikgame/templates/field_label.html -->
<div class="label">
    <div>
        <span class='label'>{{ field.label }}</span>
        <span class='label_sub'></span>:
{% if field.errors %}
        <span class='error'>{{ field.errors }}</span>
{% else %}
        <span class='pending'></span>        
{% endif %}
    </div>
    <div>
        <p class='info'></p>
    </div>
</div>
