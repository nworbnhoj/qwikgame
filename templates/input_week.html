<!-- qwikgame/templates/input_week.html -->
{% load static %}
{% load i18n %}

<div class="by_week grid_2_col">
    <div class="btn tertiary show-next-parent-sibling">
        {% translate "Select Days and Time" %}
    </div>
{% with id=widget.attrs.id %}
    <label class="btn secondary wide toggle all_week" {% if id %} for="{{ id }}_all"{% endif %}>
        <input type="checkbox" name="all_week" {% if id %} id="{{ id }}_all"{% endif %}>
        {% translate "Any Time" %}
    </label>
{% endwith %}
</div>
<div class="days hidden">
{% spaceless %}
{% for widget in widget.subwidgets %}
    {% include 'label_widget.html' %}
    {{ widget.errors }}
    {% include widget.template_name %}
{% endfor %}
{% endspaceless %}
</div>
<script defer src="{% static 'js/input_week.js' %}"></script>
