<!-- qwikgame/templates/option_delete.html -->

<div class="option">
    {{ widget.label }}
{% if widget.value != None %}    
    <div class="option push_right">
        <button type="submit" name="DELETE" class="btn naked" value="{{ widget.value|stringformat:'s' }}"
    {% if widget.attrs.confirm %}
                onclick="return confirm('{{ widget.attrs.confirm }}')"
    {% endif %}
            >
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
{% endif %}
</div>
