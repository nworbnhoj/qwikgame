<!-- qwikgame/templates/option_delete.html -->

<div class="option">
    {{ widget.label }}
{% if widget.value != None %}
    {% with action=widget.attrs.action %}
    <div class="push_right">
        <input hidden type="submit" name="{{ widget.name }}">
        <button type="submit" name="{{ action.0 }}" class="btn naked" value="{{ widget.value|stringformat:'s' }}"
    {% if action.2 %}
                onclick="return confirm('{{ action.2 }}')"
    {% endif %}
            >
            <i class="{{ action.1 }}"></i>
        </button>
    </div>
    {% endwith %}
{% endif %}
</div>
